name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-mock httpx

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=40
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///./ci-test.db
          REDIS_URL: ""
          AWS_DEFAULT_REGION: us-east-1
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_test_secret
          SQS_JOBS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123/test.fifo
          HEYGEN_API_KEY: test_key

  frontend-lint:
    name: Frontend — ESLint & TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  playwright-e2e:
    name: Frontend — Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Run Playwright tests
        run: npx playwright test --reporter=github
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build-check:
    name: Docker — build validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Validate API Dockerfile
        run: docker build -f backend/Dockerfile --target builder backend/

      - name: Validate worker Dockerfile
        run: docker build -f backend/Dockerfile.worker --target builder backend/
