name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///./ci-test.db
          REDIS_URL: ""
          AWS_DEFAULT_REGION: us-east-1

  frontend-lint:
    name: Frontend — ESLint & TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  docker-build-check:
    name: Docker — build validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Validate API Dockerfile
        run: docker build -f backend/Dockerfile --target builder backend/

      - name: Validate worker Dockerfile
        run: docker build -f backend/Dockerfile.worker --target builder backend/
