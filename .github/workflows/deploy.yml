name: Deploy to Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: 685570573617.dkr.ecr.us-east-1.amazonaws.com/trance-formation/api
  ECR_REPO_WORKER: 685570573617.dkr.ecr.us-east-1.amazonaws.com/trance-formation/worker
  ECS_CLUSTER: trance-formation-prod
  ECS_SERVICE_API: trance-formation-api-service
  ECS_SERVICE_WORKER: vantro-worker

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      api-image: ${{ steps.push.outputs.api-image }}
      worker-image: ${{ steps.push.outputs.worker-image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API and worker images
        id: push
        run: |
          SHA="${{ github.sha }}"

          docker build \
            -f backend/Dockerfile \
            -t "$ECR_REPO_API:$SHA" \
            -t "$ECR_REPO_API:latest" \
            backend/
          docker push "$ECR_REPO_API:$SHA"
          docker push "$ECR_REPO_API:latest"

          docker build \
            -f backend/Dockerfile.worker \
            -t "$ECR_REPO_WORKER:$SHA" \
            -t "$ECR_REPO_WORKER:latest" \
            backend/
          docker push "$ECR_REPO_WORKER:$SHA"
          docker push "$ECR_REPO_WORKER:latest"

          echo "api-image=$ECR_REPO_API:$SHA" >> "$GITHUB_OUTPUT"
          echo "worker-image=$ECR_REPO_WORKER:$SHA" >> "$GITHUB_OUTPUT"

  migrate:
    name: Run DB migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run alembic upgrade head via ECS run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition vantro-api \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=DISABLED}" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed — exit code: $EXIT_CODE"
            exit 1
          fi
          echo "Migration succeeded"

  deploy-api:
    name: Deploy API service
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, migrate]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: api
          image: ${{ needs.build.outputs.api-image }}

      - name: Deploy to ECS and wait for stability
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-worker:
    name: Deploy worker service
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, migrate]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-worker.json
          container-name: worker
          image: ${{ needs.build.outputs.worker-image }}

      - name: Deploy to ECS and wait for stability
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WORKER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
